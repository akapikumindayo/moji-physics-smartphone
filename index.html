<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文字物理シミュレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            transition: background-color 1s ease, filter 1s ease;
            user-select: none;
            touch-action: none;
            font-family: 'Sawarabi Mincho', 'Hiragino Mincho ProN', 'serif';
        }

        /* Normal Mode (Manuscript) */
        body.normal-mode {
            background-color: #f4ece1;
            background-image: 
                linear-gradient(90deg, rgba(200, 80, 80, 0.15) 1px, transparent 1px),
                linear-gradient(rgba(200, 80, 80, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Grayscale Mode */
        body.grayscale-mode {
            background-color: #e5e5e5;
            background-image: 
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            filter: grayscale(100%);
        }

        /* Abyss Mode */
        body.abyss-mode {
            background-color: #000000;
            background-image: none;
            filter: none;
        }

        canvas {
            display: block;
        }

        /* レスポンシブ調整を施したコントロールUI */
        .controls {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 6px;
            pointer-events: none;
            width: 95%;
            max-width: 500px;
            justify-content: center;
        }
        .controls > * {
            pointer-events: auto;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #5d4037;
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid rgba(200, 80, 80, 0.3);
            transition: all 0.5s;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .grayscale-mode .instruction {
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #999;
        }
        .abyss-mode .instruction {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
        }

        #backBtn {
            display: none;
        }
        .abyss-mode #backBtn, .grayscale-mode #backBtn {
            display: block;
        }
    </style>
</head>
<body class="normal-mode">

    <div class="controls">
        <input type="text" id="wordInput" autocomplete="off" placeholder="文字を入力..." class="px-2 md:px-4 py-1.5 md:py-2 rounded border border-red-200 bg-white/80 text-black focus:outline-none focus:ring-2 focus:ring-red-400 w-24 sm:w-32 md:w-40 text-xs sm:text-sm md:text-base">
        <button id="addBtn" class="bg-red-700 hover:bg-red-800 text-white px-3 md:px-4 py-1.5 md:py-2 rounded font-bold shadow-md transition-all active:scale-95 text-xs sm:text-sm md:text-base">追加</button>
        <button id="clearBtn" class="bg-stone-600 hover:bg-stone-700 text-white px-3 md:px-4 py-1.5 md:py-2 rounded font-bold shadow-md transition-all active:scale-95 text-xs sm:text-sm md:text-base">消去</button>
        <button id="backBtn" class="bg-blue-900 hover:bg-blue-800 text-white px-3 md:px-4 py-1.5 md:py-2 rounded font-bold shadow-md transition-all active:scale-95 text-xs sm:text-sm md:text-base">戻す</button>
    </div>

    <!-- バーチャルキーボード関連（レスポンシブ設計：スマホでは下部に広く、PCでは右下に） -->
    <button id="vkToggleBtn" class="fixed bottom-4 right-4 bg-gray-800 text-white w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full shadow-lg z-50 transition-transform active:scale-95 text-xl md:text-2xl pointer-events-auto">
        ⌨️
    </button>

    <div id="virtualKeyboard" class="fixed bottom-16 left-4 right-4 md:left-auto md:right-4 md:bottom-20 bg-white/85 backdrop-blur-md p-3 md:p-4 rounded-lg shadow-xl border border-gray-200 flex flex-col gap-2 z-50 hidden transition-opacity pointer-events-auto max-w-sm mx-auto md:mx-0">
        <div class="text-xs md:text-sm font-bold text-gray-700 text-center mb-1 border-b pb-1 border-gray-300">バーチャルキーボード</div>
        <div class="grid grid-cols-2 gap-2">
            <button id="vk-rotate-left" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform">左回転 (←)</button>
            <button id="vk-rotate-right" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform">右回転 (→)</button>
            <button id="vk-fix" class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform">固定 (k)</button>
            <button id="vk-delete" class="bg-stone-600 hover:bg-stone-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform">消去 (削除)</button>
            <button id="vk-s" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform">S極 (s)</button>
            <button id="vk-n" class="bg-red-600 hover:bg-red-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform">N極 (n)</button>
            <button id="vk-wind" class="col-span-2 bg-teal-600 hover:bg-teal-700 text-white font-bold py-1.5 md:py-2 px-2 md:px-3 rounded text-xs md:text-sm shadow active:scale-95 transition-transform select-none touch-none" style="touch-action: none;">風 (b) ※長押し</button>
        </div>
    </div>

    <div id="statusLabel" class="instruction">
        掴んでホイール回転 / 英字は軽快に跳ねる / 「k」固定 / 「b」風
    </div>

    <script>
        // ブラウザの右クリックメニューを禁止する
        window.addEventListener('contextmenu', (e) => e.preventDefault());
        const { Engine, Render, Runner, Bodies, Composite, MouseConstraint, Mouse, Events, World, Body, Vector } = Matter;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isAbyss = false;
        let isBlowing = false;
        let isBouncing = false;
        let lastGrabbedBody = null; 

        const BOUNCE_SPEED = 5; 
        const ABYSS_FALL_SPEED = 1.2;

        function playPopSound(freq = 400, type = 'sine', volume = 0.1) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        const engine = Engine.create();
        const world = engine.world;
        engine.gravity.y = 1.0; 

        let width = window.innerWidth;
        let height = window.innerHeight;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let ground, leftWall, rightWall, ceiling;
        function createWalls() {
            if (ground) Composite.remove(world, [ground, leftWall, rightWall, ceiling]);
            const options = { 
                isStatic: true, 
                restitution: 1, 
                friction: 0,
                render: { visible: false } 
            };
            ground = Bodies.rectangle(width / 2, height + 50, width, 100, options);
            leftWall = Bodies.rectangle(-50, height / 2, 100, height, options);
            rightWall = Bodies.rectangle(width + 50, height / 2, 100, height, options);
            ceiling = Bodies.rectangle(width / 2, -150, width, 100, options);
            Composite.add(world, [ground, leftWall, rightWall, ceiling]);
            
            if (isAbyss) {
                ground.isSensor = true;
                leftWall.isSensor = true;
                rightWall.isSensor = true;
                ceiling.isSensor = true;
            }
        }
        createWalls();

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { 
                stiffness: 0.2, 
                render: { visible: false }
            }
        });
        Composite.add(world, mouseConstraint);
        render.mouse = mouse;

        window.addEventListener('wheel', (e) => {
            const grabbedBody = mouseConstraint.body;
            if (grabbedBody && (!grabbedBody.isStatic || grabbedBody.isStaticToggle)) {
                const rotationDelta = e.deltaY > 0 ? 0.2 : -0.2;
                Body.rotate(grabbedBody, rotationDelta);
                if (grabbedBody.dragContext) {
                    grabbedBody.dragContext.fixedAngle = grabbedBody.angle;
                }
                Body.setAngularVelocity(grabbedBody, 0);
                e.preventDefault();
            }
        }, { passive: false });

        Events.on(mouseConstraint, 'startdrag', (event) => {
            const body = event.body;
            body.dragContext = { fixedAngle: body.angle };
            lastGrabbedBody = body; 
            
            // 固定中のオブジェクトをドラッグする場合、一時的に固定を解除する
            if (body.isStaticToggle) {
                Body.setStatic(body, false);
            }
        });

        Events.on(mouseConstraint, 'enddrag', (event) => {
            const body = event.body;
            if (body) {
                body.dragContext = null;
                
                // 元々固定設定だったものは、ドラッグを終えた瞬間に空中で再度固定する
                if (body.isStaticToggle) {
                    Body.setStatic(body, true);
                    Body.setVelocity(body, { x: 0, y: 0 });
                    Body.setAngularVelocity(body, 0);
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            if (!e || !e.key) return;

            const key = e.key.toLowerCase();
            if (key === 'k') {
                const targetBody = mouseConstraint.body || Matter.Query.point(Composite.allBodies(world), mouse.position)[0];
                if (targetBody) toggleStatic(targetBody);
            }
            if (key === 'b') isBlowing = true;
            if (key === 's' || key === 'n') {
                const grabbedBody = mouseConstraint.body;
                if (grabbedBody && grabbedBody.customText) {
                    grabbedBody.customText.magnet = key.toUpperCase(); 
                    grabbedBody.customText.color = (key === 's') ? "#2196F3" : "#F44336";
                    playPopSound(key === 's' ? 600 : 900, 'square', 0.05);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (!e || !e.key) return; 
            if (e.key.toLowerCase() === 'b') isBlowing = false;
        });

        function toggleStatic(targetBody) {
            if (targetBody.isStatic && !targetBody.isStaticToggle) return;

            if (!targetBody.isStaticToggle) {
                targetBody.isStaticToggle = true;
                if (targetBody.customText) targetBody.customText.opacity = 0.6;
                
                if (mouseConstraint.body !== targetBody) {
                    Body.setStatic(targetBody, true);
                }
                playPopSound(300, 'square', 0.05);
            } else if (targetBody.isStaticToggle) {
                targetBody.isStaticToggle = false;
                if (targetBody.customText) targetBody.customText.opacity = 1.0;
                
                if (mouseConstraint.body !== targetBody) {
                    Body.setStatic(targetBody, false);
                }
                playPopSound(500, 'sine', 0.05);
            }
        }

        function getCharacterData(char, fontSize) {
            let data = { density: 0.001, restitution: 0.4, friction: 0.2, widthFactor: 1.0, type: 'other' , magnet: null};
            
            if (char.match(/[a-zA-Z0-9]/) || char.match(/[ａ-ｚＡ-Ｚ０-９]/)) {
                data.widthFactor = 0.5;
                data.density = 0.0007; 
                data.restitution = 0.7; 
                data.friction = 0.05; 
                data.type = 'alphabet';
            }

            if (char === "氷") {
                data.friction = 0;      
                data.restitution = 0.1; 
                data.type = 'ice';
                return data;
            }
            if (char === "塊") {
                data.density = 0.05;    
                data.isBlackHole = true;
                data.type = 'blackhole';
                return data;
            }
            if (char === "重"){
                data.density = 1;
                data.friction = 1;
                data.restitution = 0;
                return data;
            }
            if (char === "軽"){
                data.density =0.001;
                data.friction =0;
                data.restitution =1;
                return data;
            }
            else if (char.match(/[。、！？!?.,]/)) {
                data.density = 0.0008;
                data.restitution = 0.8;
                data.friction = 0.1;
                data.widthFactor = 0.6;
            }
            else if (char.match(/[\u4e00-\u9faf]/)) {
                data.density = 0.005; 
                data.friction = 0.5;
                data.restitution = 0.2;
                data.widthFactor = 1.0;
            }
            return data;
        }

        function addWord(text, xPos, yPos, options = {}) {
            if (!text) return;
            
            // スマホ画面（幅 640px 未満）の場合は文字サイズを自動で 0.7 倍に縮小する
            const scaleFactor = (width < 640) ? 0.7 : 1.0;
            const baseSize = options.fontSize || Math.floor(Math.random() * 10) + 45;
            const fontSize = Math.floor(baseSize * scaleFactor);
            
            const x = xPos !== undefined && xPos !== null ? xPos : Math.random() * (width - 100) + 50;
            const y = yPos !== undefined && yPos !== null ? yPos : -50;
            
            const charData = getCharacterData(text, fontSize);
            const color = isAbyss ? "#ffffff" : "#1a1a1a";
            const w = fontSize * charData.widthFactor;
            const h = fontSize * 0.85;

            const isHalfWidth = text.match(/[a-zA-Z0-9\s!-/:-@[-`{-~]/); 
            const hitWidth = isHalfWidth ? (fontSize * 0.4) : (fontSize * 0.8);

            const wordBody = Bodies.rectangle(x, y, hitWidth, h, { 
                density: charData.density,
                restitution: isAbyss ? 0 : (isBouncing ? 1 : charData.restitution),
                friction: isBouncing ? 0 : charData.friction,
                frictionAir: (isAbyss || isBouncing) ? 0 : 0.01,
                isSensor: false, 
                render: { visible: false }
            });

            if (!isAbyss) Body.setAngle(wordBody, (Math.random() - 0.5) * 0.3);
            else Body.setAngle(wordBody, 0);

            wordBody.customText = {
                content: text,
                size: fontSize,
                color: color,
                opacity: 1.0,
                charData: charData,
                font: options.font || 'serif' 
            };

            if (options.velocity) Body.setVelocity(wordBody, options.velocity);
            else if (isAbyss) Body.setVelocity(wordBody, { x: 0, y: ABYSS_FALL_SPEED });
            else if (isBouncing) {
                const angle = Math.random() * Math.PI * 2;
                Body.setVelocity(wordBody, { x: Math.cos(angle) * BOUNCE_SPEED, y: Math.sin(angle) * BOUNCE_SPEED });
            }

            Composite.add(world, wordBody);
            
            if (!isAbyss) {
                const freq = charData.type === 'alphabet' ? 800 : 600;
                playPopSound(freq, 'sine', 0.05);
            }
            return wordBody;
        }

        Events.on(engine, 'beforeUpdate', () => {
            const bodies = Composite.allBodies(world);
            const blackHoles = bodies.filter(b => b.customText && b.customText.charData.isBlackHole);

            bodies.forEach(body => {
                if (body.isStatic || (body.customText && body.customText.charData.isBlackHole)) return;

                blackHoles.forEach(hole => {
                    const vec = Vector.sub(hole.position, body.position);
                    const distance = Vector.magnitude(vec);
                    if (distance < 2000 && distance > 1) {
                        const forceMagnitude = (body.mass * 0.0005) * (2000 / distance);
                        const force = Vector.mult(Vector.normalise(vec), forceMagnitude);
                        Body.applyForce(body, body.position, force);
                    }
                });
                    
                if (body.dragContext) {
                    Body.setAngle(body, body.dragContext.fixedAngle);
                    Body.setAngularVelocity(body, 0);
                }

                if (isBouncing && !isAbyss) {
                    const currentVelocity = body.velocity;
                    const speed = Vector.magnitude(currentVelocity);
                    if (speed < 0.1) {
                        const angle = Math.random() * Math.PI * 2;
                        Body.setVelocity(body, { x: Math.cos(angle) * BOUNCE_SPEED, y: Math.sin(angle) * BOUNCE_SPEED });
                    } else {
                        const scale = BOUNCE_SPEED / speed;
                        Body.setVelocity(body, { x: currentVelocity.x * scale, y: currentVelocity.y * scale });
                    }
                }

                if (isBlowing) {
                    const forceMagnitude = 0.03 * body.mass;
                    Body.applyForce(body, body.position, {
                        x: (Math.random() - 0.5) * forceMagnitude * 4,
                        y: (Math.random() - 0.5) * forceMagnitude * 4
                    });
                    body.torque = (Math.random() - 0.5) * 0.05 * body.mass;
                }

                if (body.position.y > height + 300) Composite.remove(world, body);
                
                if (isAbyss && body.customText) {
                    Body.setAngle(body, 0);
                    Body.setAngularVelocity(body, 0);
                    Body.setVelocity(body, { x: 0, y: ABYSS_FALL_SPEED });
                }

                const magnets = bodies.filter(b => b.customText && b.customText.magnet);

                magnets.forEach((bodyB, i) => {
                    for (let j = i + 1; j < magnets.length; j++) {
                        const bodyA = magnets[j];
                        
                        if (bodyA.isStatic && bodyB.isStatic) continue;

                        const vec = Vector.sub(bodyA.position, bodyB.position);
                        const distance = Vector.magnitude(vec);

                        if (distance < 300 && distance > 25) {
                            const forceMagnitude = (bodyB.mass * bodyA.mass) / (distance * distance) * 3; 
                            const force = Vector.mult(Vector.normalise(vec), forceMagnitude);
                            const isSamePole = bodyB.customText.magnet === bodyA.customText.magnet;
                            
                            if (!bodyB.isStatic) {
                                const forceToB = isSamePole ? Vector.neg(force) : force;
                                Body.applyForce(bodyB, bodyB.position, forceToB);
                            }
                            
                            if (!bodyA.isStatic) {
                                const forceToA = isSamePole ? force : Vector.neg(force);
                                Body.applyForce(bodyA, bodyA.position, forceToA);
                            }
                        }
                    }
                });
            });
        });

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                
                const isTrampoline = bodyA.label === 'special_trampoline' || bodyB.label === 'special_trampoline';
                if (isTrampoline) {
                    const tramp = bodyA.label === 'special_trampoline' ? bodyA : bodyB;
                    const other = bodyA.label === 'special_trampoline' ? bodyB : bodyA;

                    if (!other.isStatic) {
                        if (other.position.y < tramp.position.y) {
                            Body.setVelocity(other, {
                                x: other.velocity.x,
                                y: -18 
                            });
                            playPopSound(1200, 'sine', 0.05);
                        }
                    }
                }
                const isIceFloor = bodyA.label === 'ice_floor' || bodyB.label === 'ice_floor';

                if (isIceFloor) {
                    const other = bodyA.label === 'ice_floor' ? bodyB : bodyA;
                    other.tempFriction = other.friction;
                    other.friction = 0;
                    other.frictionStatic = 0;
                }
            });
        });

        Events.on(engine, 'collisionEnd', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                
                const isIceFloor = bodyA.label === 'ice_floor' || bodyB.label === 'ice_floor';
                if (isIceFloor) {
                    const other = bodyA.label === 'ice_floor' ? bodyB : bodyA;
                    if (other.tempFriction !== undefined) {
                        other.friction = other.tempFriction;
                        other.frictionStatic = other.tempFriction * 2; 
                        delete other.tempFriction;
                    } else if (other.customText && other.customText.charData) {
                        other.friction = other.customText.charData.friction;
                    }
                }
            });
        });

        const virtualKeyboard = document.getElementById('virtualKeyboard');
        const vkToggleBtn = document.getElementById('vkToggleBtn');

        Events.on(render, 'afterRender', function() {
            const context = render.context;
            const bodies = Composite.allBodies(world);
            context.textAlign = 'center';
            context.textBaseline = 'middle';

            bodies.forEach(body => {
                if (body.customText) {
                    const { content, size, color, opacity, charData, font } = body.customText; 
                    context.save();
                    context.globalAlpha = opacity;
                    context.translate(body.position.x, body.position.y);
                    context.rotate(body.angle);

                    // バーチャルキーボードが表示中、かつ選択中の場合のみハイライトを適用する
                    const isSelected = (body === lastGrabbedBody) && !virtualKeyboard.classList.contains('hidden');

                    // 描画色の優先順位変更：磁石状態を最優先
                    if (body.customText.magnet) {
                        context.fillStyle = (body.customText.magnet === 'S') ? "#2196F3" : "#F44336";
                    } else if (isSelected) {
                        context.fillStyle = "#ff9800"; 
                    } else if (body.label === 'ice_floor' || (body.customText && body.customText.content === "氷")) {
                        context.fillStyle = "#a5f3fc"; 
                    } else {
                        context.fillStyle = color;
                    }
                    
                    // 影の優先順位変更：磁石状態を最優先
                    if (body.customText.magnet) {
                        context.shadowBlur = 15;
                        context.shadowColor = (body.customText.magnet === 'S') ? "#2196F3" : "#F44336";
                        context.shadowOffsetX = 0;
                        context.shadowOffsetY = 0;
                    } else if (isSelected) {
                         context.shadowColor = '#ff9800';
                         context.shadowBlur = 15;
                         context.shadowOffsetX = 0;
                         context.shadowOffsetY = 0;
                    } else {
                        if (isAbyss) {
                            context.shadowColor = 'rgba(255,255,255,0.6)';
                            context.shadowBlur = 10;
                            context.shadowOffsetX = 0;
                            context.shadowOffsetY = 0;
                        } else {
                            context.shadowColor = 'rgba(0,0,0,0.2)';
                            context.shadowBlur = 4;
                            context.shadowOffsetX = 2;
                            context.shadowOffsetY = 2;
                        }
                    }

                    if (charData.type === 'alphabet') {
                        context.font = `bold ${size}px 'Arial', sans-serif`;
                    } else {
                        context.font = `bold ${size}px ${font || 'serif'}`;
                    }
                    
                    context.fillText(content, 0, 0);
                    context.restore();
                }
            });
        });

        const input = document.getElementById('wordInput');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const backBtn = document.getElementById('backBtn');
        const statusLabel = document.getElementById('statusLabel');

        function triggerAbyss(isStaffRoll = false) {
            isAbyss = true;
            isBouncing = false;
            document.body.className = "abyss-mode";
            if (ground) ground.isSensor = true;
            engine.gravity.y = 0; 
            statusLabel.innerText = isStaffRoll ? "……全てあなたの所為です。" : "深淵";

            Composite.allBodies(world).forEach(body => {
                if (body.customText) {
                    body.customText.color = "#ffffff";
                    body.isSensor = true;
                    Body.setAngle(body, 0);
                    Body.setStatic(body, false);
                }
            });
        }

        function addAbyssWords(message) {
            const chars = message.split('');
            const baseFontSize = 55;
            const scaleFactor = (width < 640) ? 0.7 : 1.0;
            const fontSize = Math.floor(baseFontSize * scaleFactor);
            const spacing = fontSize * 1.05;
            const totalWidth = (chars.length - 1) * spacing;
            const startX = (width - totalWidth) / 2;

            chars.forEach((char, i) => {
                addWord(char, startX + i * spacing, -100, {
                    fontSize: baseFontSize, // addWord関数内で自動スケーリングされます
                    isSensor: true
                });
            });
        }

        function handleAdd() {
            let val = input.value.trim().replace(/：/g, ':');
            if (!val) return;

            let targetFont = 'serif'; 
            let displayText = val;

            if (displayText === "トランポリン") {
                addTrampolineObject(displayText);
                input.value = '';
                return;
            }

            if (displayText === "氷床") {
                addIceFloorObject("氷床氷床氷床氷床氷床氷床氷床");
                input.value = '';
                return;
            }

            if (displayText === "鎖" || displayText === "つなげる" || displayText.startsWith("つなげる:")) {
                const textToChain = displayText.includes(":") ? displayText.split(":")[1] : "鎖鎖鎖鎖";
                addChain(textToChain);
                input.value = '';
                return;
            }

            if (displayText.startsWith("連結:")) {
                const textToConnect = displayText.split(":")[1];
                if (textToConnect) {
                    addConnectedObject(textToConnect, 'serif');
                }
                input.value = '';
                return;
            }
            
            if (displayText === "バウンド") {
                isBouncing = !isBouncing;
                document.body.classList.toggle('grayscale-mode', isBouncing);
                engine.gravity.y = isBouncing ? 0 : 1.0;
                if (isBouncing) {
                    Composite.allBodies(world).forEach(body => {
                        if (!body.isStatic) {
                            const angle = Math.random() * Math.PI * 2;
                            Body.setVelocity(body, { x: Math.cos(angle) * BOUNCE_SPEED, y: Math.sin(angle) * BOUNCE_SPEED });
                        }
                    });
                }
                statusLabel.innerText = isBouncing ? "バウンドモード：有効 (等速反射)" : "通常モード";
                input.value = '';
                playPopSound(isBouncing ? 800 : 400);
                return;
            }
            if (displayText === "全てあなたの所為です") { 
                triggerAbyss(true); 
                addAbyssWords("全てあなたの所為です");
                input.value = ''; 
                return; 
            }
            if (displayText === "深淵") {
                triggerAbyss(false);
                input.value = '';
                return;
            }

            if (val.includes(':')) {
                const parts = val.split(':');
                targetFont = parts[0];
                displayText = parts[1];
                if (!displayText) return;
            }
            
            if (val) {
                if (isAbyss) {
                    addAbyssWords(displayText);
                } else {
                    displayText.split('').forEach((char, i) => {
                        setTimeout(() => addWord(char, null, null, { font: targetFont }), i * 100);
                    });
                }
                input.value = '';
            }
        }

        addBtn.onclick = handleAdd;
        input.onkeypress = (e) => { if (e.key === 'Enter') handleAdd(); };
        
        clearBtn.onclick = () => {
            const allConstraints = Composite.allConstraints(world);
            allConstraints.forEach(constraint => {
                Composite.remove(world, constraint);
            });

            const toRemove = Composite.allBodies(world).filter(b => !b.isStatic || b.isStaticToggle);
            Composite.remove(world, toRemove);

            if (Composite.allConstraints(world).indexOf(mouseConstraint) === -1) {
                Composite.add(world, mouseConstraint);
            }

            playPopSound(200, 'square', 0.1);
        };

        backBtn.onclick = () => {
            isAbyss = false;
            isBouncing = false;
            document.body.className = "normal-mode";
            engine.gravity.y = 1.0;
            if (ground) ground.isSensor = false;
            statusLabel.innerText = "掴んでホイール回転 / 英字は軽快に跳ねる / 「k」固定 / 「b」風";
            
            Composite.allBodies(world).forEach(body => {
                if (body.customText) {
                    body.customText.color = "#1a1a1a";
                    body.isSensor = false;
                }
            });
            playPopSound(400);
        };

        const randomChars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんABCDEFGabcdefg0123456789漢字所為跳躍深淵回転固定フロクロ方眼紙原稿用紙JavaScriptジャバスクリプトカタカナひらがなalphabet記号";
        render.canvas.addEventListener('mousedown', (e) => {
            const mousePos = mouse.position;
            const bodiesAtPoint = Matter.Query.point(Composite.allBodies(world), mousePos);

            // 左クリックで何もない場所をクリックした場合は選択解除
            if (e.button === 0 && bodiesAtPoint.length === 0) {
                lastGrabbedBody = null;
            }

            if (e.button === 2) {
                bodiesAtPoint.forEach(body => {
                    if (!body.isStatic || body.isStaticToggle) {
                        const allConstraints = Composite.allConstraints(world);
                        allConstraints.forEach(constraint => {
                            if (constraint.bodyA === body || constraint.bodyB === body) {
                                Composite.remove(world, constraint);
                            }
                        });
                        Composite.remove(world, body);
                        playPopSound(200, 'square', 0.05);
                    }
                });
                return;
            }

            setTimeout(() => {
                if (!mouseConstraint.body && !isAbyss && e.button === 0) {
                    const char = randomChars[Math.floor(Math.random() * randomChars.length)];
                    addWord(char, mousePos.x, mousePos.y);
                }
            }, 30);
        });

        // スマホなどのタッチパネル（touchstart）でも確実に対象オブジェクトの選択解除や検出をサポート
        render.canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (!touch) return;
            const rect = render.canvas.getBoundingClientRect();
            const mousePos = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
            const bodiesAtPoint = Matter.Query.point(Composite.allBodies(world), mousePos);
            if (bodiesAtPoint.length === 0) {
                lastGrabbedBody = null;
            } else {
                lastGrabbedBody = bodiesAtPoint[0];
            }
        });
        
        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            render.canvas.width = width; render.canvas.height = height;
            createWalls();
        });

        window.onload = () => {
            "Physics".split('').forEach((c, i) => {
                setTimeout(() => addWord(c), i * 150 + 600);
            });
        };
        
        function addTrampolineObject(text) {
            const x = Math.random() * (width - 200) + 100;
            const y = -50;
            const baseFontSize = 60;
            const scaleFactor = (width < 640) ? 0.7 : 1.0;
            const fontSize = Math.floor(baseFontSize * scaleFactor);
            const w = fontSize * 6; 
            const h = fontSize * 1.2;

            const trampBody = Bodies.rectangle(x, y, w, h, {
                restitution: 0.8,
                friction: 0.1,
                label: 'special_trampoline',
                render: { visible: false }
            });

            trampBody.customText = {
                content: text,
                size: fontSize,
                color: "#000000", 
                opacity: 1.0,
                charData: { type: 'other' }
            };

            Composite.add(world, trampBody);
            playPopSound(400, 'square', 0.1);
        }

        function addChain(text) {
            const chars = text.split('');
            const baseFontSize = 50;
            const scaleFactor = (width < 640) ? 0.7 : 1.0;
            const fontSize = Math.floor(baseFontSize * scaleFactor);
            const startX = Math.random() * (width - 200) + 100;
            const startY = 100; 
            
            let lastBody = null;

            chars.forEach((char, i) => {
                const currentY = startY + (i * (fontSize + 10));
                // addWordに元のbaseFontSizeを渡すことで、内部で自動スケールされます
                const body = addWord(char, startX, currentY, { fontSize: baseFontSize }); 

                if (lastBody && body) {
                    const constraint = Matter.Constraint.create({
                        bodyA: lastBody,
                        bodyB: body,
                        pointA: { x: 0, y: fontSize / 2 },
                        pointB: { x: 0, y: -fontSize / 2 },
                        stiffness: 0.4,
                        length: 5,
                        render: {
                            visible: true,
                            strokeStyle: isAbyss ? '#ffffff' : '#8d6e63',
                            lineWidth: 3
                        }
                    });
                    Composite.add(world, constraint);
                }
                lastBody = body;
            });
            playPopSound(600, 'sine', 0.1);
        }

        function addIceFloorObject(text) {
            const baseFontSize = 55;
            const scaleFactor = (width < 640) ? 0.7 : 1.0;
            const fontSize = Math.floor(baseFontSize * scaleFactor);
            const w = fontSize * 14; 
            const h = fontSize * 1.5; 
            const x = Math.random() * (width - w) + w / 2;
            const y = 100;

            const iceBody = Bodies.rectangle(x, y, w, h, {
                restitution: 0.1,
                friction: 0,
                frictionStatic: 0, 
                frictionAir: 0.001,
                label: 'ice_floor',
                render: { visible: false }
            });

            iceBody.customText = {
                content: text,
                size: fontSize,
                color: "#000000",
                charData: { type: 'ice' }
            };

            Composite.add(world, iceBody);
        }

        function addConnectedObject(text, font = 'serif') {
            const baseFontSize = 55;
            const scaleFactor = (width < 640) ? 0.7 : 1.0;
            const fontSize = Math.floor(baseFontSize * scaleFactor);
            const w = fontSize * text.length * 0.8; 
            const h = fontSize * 1.2;
            const x = Math.random() * (width - w) + w / 2;
            const y = -50;

            const connectedBody = Bodies.rectangle(x, y, w, h, {
                restitution: 0.4,
                friction: 0.2,
                label: 'connected_object',
                render: { visible: false }
            });

            connectedBody.customText = {
                content: text,
                size: fontSize,
                color: isAbyss ? "#ffffff" : "#1a1a1a",
                charData: { type: 'other' },
                font: font 
            };

            Composite.add(world, connectedBody);
            playPopSound(500, 'sine', 0.1);
        }

        vkToggleBtn.addEventListener('click', () => {
            virtualKeyboard.classList.toggle('hidden');
            playPopSound(500, 'sine', 0.05);
        });

        function getTargetBody() {
            return mouseConstraint.body || lastGrabbedBody;
        }

        // --- 各バーチャルボタンのイベント登録 ---
        document.getElementById('vk-fix').addEventListener('click', () => {
            const targetBody = getTargetBody();
            if (targetBody) toggleStatic(targetBody);
        });

        document.getElementById('vk-delete').addEventListener('click', () => {
            const targetBody = getTargetBody();
            if (targetBody && (!targetBody.isStatic || targetBody.isStaticToggle)) {
                const allConstraints = Composite.allConstraints(world);
                allConstraints.forEach(constraint => {
                    if (constraint.bodyA === targetBody || constraint.bodyB === targetBody) {
                        Composite.remove(world, constraint);
                    }
                });
                Composite.remove(world, targetBody);
                playPopSound(200, 'square', 0.05);
                
                if (mouseConstraint.body === targetBody) mouseConstraint.body = null;
                if (lastGrabbedBody === targetBody) lastGrabbedBody = null;
            }
        });

        document.getElementById('vk-s').addEventListener('click', () => {
            const targetBody = getTargetBody();
            if (targetBody && targetBody.customText) {
                targetBody.customText.magnet = 'S';
                targetBody.customText.color = "#2196F3";
                playPopSound(600, 'square', 0.05);
            }
        });

        document.getElementById('vk-n').addEventListener('click', () => {
            const targetBody = getTargetBody();
            if (targetBody && targetBody.customText) {
                targetBody.customText.magnet = 'N';
                targetBody.customText.color = "#F44336";
                playPopSound(900, 'square', 0.05);
            }
        });

        // 回転ボタン（左・右）
        function rotateBody(delta) {
            const targetBody = getTargetBody();
            if (targetBody && (!targetBody.isStatic || targetBody.isStaticToggle)) {
                Body.rotate(targetBody, delta);
                if (targetBody.dragContext) {
                    targetBody.dragContext.fixedAngle = targetBody.angle;
                }
                Body.setAngularVelocity(targetBody, 0);
                playPopSound(500, 'sine', 0.05);
            }
        }
        document.getElementById('vk-rotate-left').addEventListener('click', () => rotateBody(-0.2));
        document.getElementById('vk-rotate-right').addEventListener('click', () => rotateBody(0.2));

        // 風(b)ボタン - タッチ・PC両対応
        const btnWind = document.getElementById('vk-wind');
        const startWind = (e) => { e.preventDefault(); isBlowing = true; };
        const stopWind = (e) => { e.preventDefault(); isBlowing = false; };
        
        btnWind.addEventListener('pointerdown', startWind);
        btnWind.addEventListener('pointerup', stopWind);
        btnWind.addEventListener('pointerleave', stopWind);
        btnWind.addEventListener('pointercancel', stopWind);

    </script>
</body>
</html>
